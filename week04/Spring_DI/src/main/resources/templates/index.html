<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quản lý Sinh viên</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 40px 0;
        }
        .card {
            border: none;
            border-radius: 15px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }
        .card-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-radius: 15px 15px 0 0 !important;
            padding: 20px;
        }
        .card-header h3 {
            margin: 0;
            font-weight: 600;
        }
        .form-control:focus {
            border-color: #667eea;
            box-shadow: 0 0 0 0.2rem rgba(102, 126, 234, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            padding: 10px 30px;
            border-radius: 25px;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
            background: linear-gradient(135deg, #764ba2 0%, #667eea 100%);
        }
        .table {
            margin-bottom: 0;
        }
        .table thead th {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px;
            font-weight: 600;
        }
        .table tbody tr {
            transition: background-color 0.3s;
        }
        .table tbody tr:hover {
            background-color: #f8f9fa;
        }
        .table tbody td {
            padding: 15px;
            vertical-align: middle;
        }
        .btn-action {
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            margin: 2px;
        }
        .btn-edit {
            background-color: #ffc107;
            border: none;
            color: #000;
        }
        .btn-edit:hover {
            background-color: #e0a800;
            color: #000;
        }
        .btn-delete {
            background-color: #dc3545;
            border: none;
            color: white;
        }
        .btn-delete:hover {
            background-color: #c82333;
        }
        .form-label {
            font-weight: 600;
            color: #333;
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #6c757d;
        }
        .empty-state i {
            font-size: 60px;
            margin-bottom: 20px;
            color: #dee2e6;
        }
        .badge-id {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: 600;
        }
        .title-icon {
            margin-right: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Form Card -->
        <div class="card mb-4">
            <div class="card-header">
                <h3><i class="fas fa-user-plus title-icon"></i>
                    <span th:if="${isEdit}">Cập nhật Sinh viên</span>
                    <span th:unless="${isEdit}">Thêm Sinh viên mới</span>
                </h3>
            </div>
            <div class="card-body p-4">
                <form th:action="${isEdit} ? @{/update} : @{/add}" method="post" th:object="${student}">
                    <input type="hidden" th:field="*{id}" th:if="${isEdit}">
                    <div class="row">
                        <div class="col-md-4 mb-3">
                            <label class="form-label"><i class="fas fa-user me-2"></i>Họ và tên</label>
                            <input type="text" class="form-control" th:field="*{name}" placeholder="Nhập họ và tên" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label"><i class="fas fa-envelope me-2"></i>Email</label>
                            <input type="email" class="form-control" th:field="*{email}" placeholder="Nhập email" required>
                        </div>
                        <div class="col-md-4 mb-3">
                            <label class="form-label"><i class="fas fa-birthday-cake me-2"></i>Tuổi</label>
                            <input type="number" class="form-control" th:field="*{age}" placeholder="Nhập tuổi" required>
                        </div>
                    </div>
                    <div class="text-center mt-3">
                        <button type="submit" class="btn btn-primary">
                            <i class="fas fa-save me-2"></i>
                            <span th:if="${isEdit}">Cập nhật</span>
                            <span th:unless="${isEdit}">Thêm mới</span>
                        </button>
                        <a th:if="${isEdit}" href="/" class="btn btn-secondary ms-2" style="border-radius: 25px; padding: 10px 30px;">
                            <i class="fas fa-times me-2"></i>Hủy
                        </a>
                    </div>
                </form>
            </div>
        </div>

        <!-- Table Card -->
        <div class="card">
            <div class="card-header d-flex justify-content-between align-items-center">
                <h3 class="mb-0"><i class="fas fa-users title-icon"></i>Danh sách Sinh viên</h3>
                <form action="/" method="get" class="d-flex">
                    <input type="text" name="keyword" class="form-control me-2" placeholder="Tìm theo tên..." 
                           th:value="${keyword}" style="border-radius: 20px; width: 250px;">
                    <button type="submit" class="btn btn-light" style="border-radius: 20px;">
                        <i class="fas fa-search"></i>
                    </button>
                    <a th:if="${keyword}" href="/" class="btn btn-outline-light ms-2" style="border-radius: 20px;">
                        <i class="fas fa-times"></i>
                    </a>
                </form>
            </div>
            <div class="card-body p-0">
                <div th:if="${#lists.isEmpty(students)}" class="empty-state">
                    <i class="fas fa-user-slash"></i>
                    <h4>Chưa có sinh viên nào</h4>
                    <p>Hãy thêm sinh viên mới bằng form phía trên</p>
                </div>
                <table class="table" th:unless="${#lists.isEmpty(students)}">
                    <thead>
                        <tr>
                            <th><i class="fas fa-hashtag me-2"></i>ID</th>
                            <th><i class="fas fa-user me-2"></i>Họ và tên</th>
                            <th><i class="fas fa-envelope me-2"></i>Email</th>
                            <th><i class="fas fa-birthday-cake me-2"></i>Tuổi</th>
                            <th class="text-center"><i class="fas fa-cogs me-2"></i>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="s : ${students}">
                            <td><span class="badge badge-id" th:text="${s.id}"></span></td>
                            <td th:text="${s.name}"></td>
                            <td th:text="${s.email}"></td>
                            <td th:text="${s.age}"></td>
                            <td class="text-center">
                                <a th:href="@{/edit/{id}(id=${s.id})}" class="btn btn-action btn-edit">
                                    <i class="fas fa-edit me-1"></i>Sửa
                                </a>
                                <a th:href="@{/delete/{id}(id=${s.id})}" class="btn btn-action btn-delete" 
                                   onclick="return confirm('Bạn có chắc muốn xóa sinh viên này?')">
                                    <i class="fas fa-trash me-1"></i>Xóa
                                </a>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Footer -->
        <div class="text-center mt-4 text-white">
            <p><i class="fas fa-graduation-cap me-2"></i>Quản lý Sinh viên - Spring Boot &amp; Thymeleaf</p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
