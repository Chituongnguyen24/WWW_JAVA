<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Detail</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
        .profile-icon { font-size: 4rem; color: #0d6efd; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-info text-white">
                    <h4 class="mb-0"><i class="bi bi-person-badge me-2"></i>Student Details</h4>
                </div>
                <div class="card-body text-center">
                    <div class="mb-4">
                        <i class="bi bi-person-circle profile-icon"></i>
                    </div>
                    
                    <h3 class="mb-3" th:text="${student.name}">Student Name</h3>
                    
                    <div class="row text-start">
                        <div class="col-12">
                            <ul class="list-group list-group-flush">
                                <li class="list-group-item d-flex justify-content-between">
                                    <span class="fw-bold"><i class="bi bi-hash me-2"></i>ID</span>
                                    <span class="badge bg-secondary" th:text="${student.id}"></span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span class="fw-bold"><i class="bi bi-person me-2"></i>Name</span>
                                    <span th:text="${student.name}"></span>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span class="fw-bold"><i class="bi bi-envelope me-2"></i>Email</span>
                                    <a th:href="'mailto:' + ${student.email}" th:text="${student.email}"></a>
                                </li>
                                <li class="list-group-item d-flex justify-content-between">
                                    <span class="fw-bold"><i class="bi bi-calendar3 me-2"></i>Age</span>
                                    <span th:text="${student.age} + ' years old'"></span>
                                </li>
                            </ul>
                        </div>
                    </div>
                </div>
                <div class="card-footer d-flex justify-content-between">
                    <a th:href="@{/students}" class="btn btn-outline-secondary">
                        <i class="bi bi-arrow-left me-1"></i>Back to List
                    </a>
                    <div>
                        <a th:href="@{/students/edit/{id}(id=${student.id})}" class="btn btn-warning">
                            <i class="bi bi-pencil me-1"></i>Edit
                        </a>
                        <a th:href="@{/students/delete/{id}(id=${student.id})}" class="btn btn-danger"
                           onclick="return confirm('Are you sure you want to delete this student?')">
                            <i class="bi bi-trash me-1"></i>Delete
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
