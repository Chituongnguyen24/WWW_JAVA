<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Management</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body { background-color: #f8f9fa; }
        .card { box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); }
        .table th { background-color: #0d6efd; color: white; }
        .btn-action { padding: 0.25rem 0.5rem; font-size: 0.875rem; }
    </style>
</head>
<body>

<div class="container py-4">
    <div class="card">
        <div class="card-header bg-primary text-white d-flex justify-content-between align-items-center">
            <h4 class="mb-0"><i class="bi bi-people-fill me-2"></i>Student Management</h4>
            <a th:href="@{/students/new}" class="btn btn-light btn-sm">
                <i class="bi bi-plus-circle me-1"></i>Add Student
            </a>
        </div>
        <div class="card-body">
            <!-- Search Form -->
            <form th:action="@{/students/search}" method="get" class="row g-3 mb-4">
                <div class="col-md-8">
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-search"></i></span>
                        <input type="text" name="keyword" class="form-control"
                               placeholder="Search by name or email..." th:value="${keyword}">
                    </div>
                </div>
                <div class="col-md-4">
                    <button type="submit" class="btn btn-primary me-2">
                        <i class="bi bi-search me-1"></i>Search
                    </button>
                    <a th:href="@{/students}" class="btn btn-outline-secondary">Clear</a>
                </div>
            </form>

            <!-- Student Table -->
            <div class="table-responsive">
                <table class="table table-hover table-bordered align-middle">
                    <thead>
                    <tr>
                        <th style="width: 60px">ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th style="width: 80px">Age</th>
                        <th style="width: 180px" class="text-center">Actions</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="s : ${students}">
                        <td th:text="${s.id}" class="text-center fw-bold"></td>
                        <td th:text="${s.name}"></td>
                        <td>
                            <i class="bi bi-envelope me-1 text-muted"></i>
                            <span th:text="${s.email}"></span>
                        </td>
                        <td th:text="${s.age}" class="text-center"></td>
                        <td class="text-center">
                            <a th:href="@{/students/{id}(id=${s.id})}" 
                               class="btn btn-info btn-action text-white" title="View">
                                <i class="bi bi-eye"></i>
                            </a>
                            <a th:href="@{/students/edit/{id}(id=${s.id})}" 
                               class="btn btn-warning btn-action" title="Edit">
                                <i class="bi bi-pencil"></i>
                            </a>
                            <a th:href="@{/students/delete/{id}(id=${s.id})}"
                               class="btn btn-danger btn-action" title="Delete"
                               onclick="return confirm('Are you sure you want to delete this student?')">
                                <i class="bi bi-trash"></i>
                            </a>
                        </td>
                    </tr>
                    <tr th:if="${#lists.isEmpty(students)}">
                        <td colspan="5" class="text-center text-muted py-4">
                            <i class="bi bi-inbox fs-1 d-block mb-2"></i>
                            No students found
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <!-- Summary -->
            <div class="d-flex justify-content-between align-items-center mt-3">
                <span class="text-muted">
                    Total: <strong th:text="${students.size()}">0</strong> students
                </span>
            </div>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
