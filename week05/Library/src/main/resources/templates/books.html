<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Library</h2>

<form th:action="@{/books/search}">
    <input name="keyword" placeholder="Search">
    <button>Search</button>
</form>

<a th:href="@{/books/add}">Add Book</a>

<form th:action="@{/books/filter}">
    <select name="name">
        <option th:each="c:${categories}"
                th:value="${c.name}"
                th:text="${c.name}">
        </option>
    </select>
    <button>Filter</button>
</form>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Title</th>
        <th>Author</th>
        <th>Category</th>
        <th>Action</th>
    </tr>

    <tr th:each="b:${books}">
        <td th:text="${b.id}"></td>
        <td th:text="${b.title}"></td>
        <td th:text="${b.author}"></td>
        <td th:text="${b.category.name}"></td>

        <td>
            <a th:href="@{/books/edit/{id}(id=${b.id})}">Edit</a>
            <a th:href="@{/books/delete/{id}(id=${b.id})}">Delete</a>
        </td>
    </tr>

</table>

</body>
</html>
