<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<h2>Book Form</h2>

<form th:action="@{/books/save}" method="post" th:object="${book}">

  <input type="hidden" th:field="*{id}">

  Title:
  <input th:field="*{title}"><br>

  Author:
  <input th:field="*{author}"><br>

  Price:
  <input th:field="*{price}"><br>

  Year:
  <input th:field="*{publishedYear}"><br>

  Category:
  <select th:field="*{category}">
    <option th:each="c : ${categories}"
            th:value="${c.id}"
            th:text="${c.name}">
    </option>
  </select>

  <button type="submit">Save</button>

</form>

</body>
</html>
